<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:3001 ws://localhost:3001 http://172.20.10.3:3001 ws://172.20.10.3:3001;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord</title>
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/titlebar.css" />
    <link rel="stylesheet" href="styles/server-list.css" />
    <link rel="stylesheet" href="styles/channel-sidebar.css" />
    <link rel="stylesheet" href="styles/chat.css" />
    <link rel="stylesheet" href="styles/messages.css" />
    <link rel="stylesheet" href="styles/members.css" />
    <link rel="stylesheet" href="styles/friends.css" />
  </head>
  <body>
    <div id="app">
      <!-- Barre de titre personnalisée -->
      <header id="titlebar">
        <span class="titlebar-title">Discord</span>
        <div class="titlebar-controls">
          <button id="btn-minimize" title="Réduire">
            <svg viewBox="0 0 10 1" width="10" height="10">
              <rect fill="currentColor" width="10" height="1" />
            </svg>
          </button>
          <button id="btn-maximize" title="Agrandir">
            <span class="icon-maximize">
              <svg viewBox="0 0 10 10" width="10" height="10">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1"
                  d="M0 0h10v10H0z"
                />
              </svg>
            </span>
            <span class="icon-restore" style="display: none">
              <svg viewBox="0 0 10 10" width="10" height="10">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1"
                  d="M2 0h8v8M0 2h8v8H0z"
                />
              </svg>
            </span>
          </button>
          <button id="btn-close" title="Fermer">
            <svg viewBox="0 0 10 10" width="10" height="10">
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
                d="M0 0l10 10M10 0L0 10"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Layout principal -->
      <div id="main-layout">
        <!-- Colonne des serveurs -->
        <div id="server-list-wrapper">
          <ul id="server-list"></ul>
        </div>

        <!-- Sidebar salons -->
        <aside id="channel-sidebar">
          <div id="server-header">
            <span id="server-header-name">Messages Privés</span>
            <svg
              class="server-header-chevron"
              viewBox="0 0 24 24"
              width="16"
              height="16"
            >
              <path fill="currentColor" d="M7 10l5 5 5-5H7z" />
            </svg>
          </div>

          <div id="channel-list"></div>

          <!-- Panneau utilisateur -->
          <div id="user-panel">
            <div class="user-avatar-wrapper">
              <div class="user-avatar">U</div>
              <div class="user-status-indicator"></div>
            </div>
            <div class="user-info">
              <div class="user-name">Utilisateur</div>
            </div>
            <div class="user-controls">
              <button
                class="user-control-btn btn-theme-toggle"
                title="Mode clair"
              >
                <span class="icon-moon">
                  <svg viewBox="0 0 24 24" width="20" height="20">
                    <path
                      fill="currentColor"
                      d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"
                    />
                  </svg>
                </span>
                <span class="icon-sun" style="display: none">
                  <svg viewBox="0 0 24 24" width="20" height="20">
                    <path
                      fill="currentColor"
                      d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0zM7.05 18.36l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0z"
                    />
                  </svg>
                </span>
              </button>
              <button class="user-control-btn active" title="Couper le micro">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="currentColor"
                    d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
                  />
                </svg>
              </button>
              <button
                class="user-control-btn active"
                title="Désactiver le casque"
              >
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="currentColor"
                    d="M12 3C7.03 3 3 7.03 3 12v4.5c0 1.38 1.12 2.5 2.5 2.5H7v-5H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-2v5h1.5c1.38 0 2.5-1.12 2.5-2.5V12c0-4.97-4.03-9-9-9z"
                  />
                </svg>
              </button>
              <button class="user-control-btn" title="Paramètres utilisateur">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="currentColor"
                    d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54C14.57 2.18 14.38 2 14.14 2h-4.28c-.24 0-.43.18-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.51 8.47c-.12.21-.08.47.12.61l2.03 1.58C4.6 10.96 4.57 11.48 4.57 12s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h4.28c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </aside>

        <!-- Zone de discussion -->
        <main id="chat-area">
          <div id="chat-header">
            <span id="chat-header-icon"></span>
            <span id="chat-header-name">Messages Privés</span>
            <div class="chat-header-separator"></div>
            <span class="chat-header-topic" id="chat-header-topic"
              >Sélectionnez un salon pour commencer</span
            >
            <div class="chat-header-actions">
              <button class="chat-header-btn" title="Rechercher">
                <svg viewBox="0 0 24 24" width="24" height="24">
                  <path
                    fill="currentColor"
                    d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
                  />
                </svg>
              </button>
              <button class="chat-header-btn" title="Épingler des messages">
                <svg viewBox="0 0 24 24" width="24" height="24">
                  <path
                    fill="currentColor"
                    d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"
                  />
                </svg>
              </button>
              <button class="chat-header-btn" id="btn-members" title="Membres">
                <svg viewBox="0 0 24 24" width="24" height="24">
                  <path
                    fill="currentColor"
                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- Corps du chat : messages + panneau membres -->
          <div id="chat-body">
            <div id="chat-main">
              <div id="messages-container">
                <div id="chat-empty-state">
                  <div class="empty-icon-wrapper">
                    <span class="empty-icon"></span>
                  </div>
                  <div class="empty-title">Bienvenue !</div>
                  <div class="empty-desc">
                    Sélectionnez un salon pour commencer.
                  </div>
                </div>
              </div>

              <div id="typing-indicator" class="typing-indicator"></div>

              <div id="chat-input-area">
                <div class="message-input-wrapper">
                  <button class="input-add-btn" title="Joindre un fichier">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                      <path
                        fill="currentColor"
                        d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"
                      />
                    </svg>
                  </button>
                  <div
                    id="message-input"
                    class="message-input"
                    contenteditable="true"
                    data-placeholder="Envoyer un message…"
                    role="textbox"
                    aria-label="Saisir un message"
                  ></div>
                  <div class="message-input-actions">
                    <button class="input-action-btn" title="Emoji">
                      <svg viewBox="0 0 24 24" width="22" height="22">
                        <path
                          fill="currentColor"
                          d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"
                        />
                      </svg>
                    </button>
                    <button class="input-action-btn" title="GIF">
                      <svg viewBox="0 0 24 24" width="22" height="22">
                        <path
                          fill="currentColor"
                          d="M11.5 9H13v6h-1.5zM9 9H6c-.6 0-1 .5-1 1v4c0 .5.4 1 1 1h3c.6 0 1-.5 1-1v-2H8.5v1.5h-2v-3H10V10c0-.5-.4-1-1-1zm10 1.5V9h-4.5v6H16v-2h2v-1.5h-2v-1z"
                        />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Panneau membres -->
            <aside id="members-panel">
              <div class="members-panel-header">Membres</div>
              <div id="members-list"></div>
            </aside>
          </div>
        </main>
      </div>
      <!-- /#main-layout -->
    </div>
    <!-- /#app -->

    <script src="../../node_modules/socket.io-client/dist/socket.io.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/messages.js"></script>
    <script src="scripts/members.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/server-dnd.js"></script>
    <script src="scripts/socket.js"></script>
    <script src="scripts/friends.js"></script>
    <script src="scripts/app.js"></script>
  </body>
</html>
